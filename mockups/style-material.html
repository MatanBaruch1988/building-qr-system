<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material You</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FEF7FF;
    color: #1D1B20;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .label-top {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #79747E;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .card {
    background: #F3EDF7;
    border-radius: 28px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-header { margin-bottom: 28px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E8DEF8;
    color: #4A4458;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1D1B20;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .subtitle {
    font-size: 14px;
    color: #49454F;
  }
  .worker-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .worker-item {
    background: #FFFBFE;
    border: 1px solid #CAC4D0;
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: #49454F;
    cursor: pointer;
    transition: all 0.2s;
  }
  .worker-item.selected {
    background: #6750A4;
    border-color: #6750A4;
    color: #fff;
    box-shadow: 0 2px 8px rgba(103,80,164,0.35);
  }
  .divider {
    height: 1px;
    background: #CAC4D0;
    margin: 18px 0;
  }
  .pin-label {
    font-size: 12px;
    font-weight: 500;
    color: #49454F;
    margin-bottom: 12px;
    text-align: center;
  }
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 0 0 24px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #E8DEF8;
    border: 2px solid #CAC4D0;
  }
  .dot.filled {
    background: #6750A4;
    border-color: #6750A4;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    letter-spacing: 0.01em;
    transition: all 0.2s;
  }
  .btn-primary {
    background: #6750A4;
    color: #FFFFFF;
    box-shadow: 0 1px 3px rgba(103,80,164,0.3), 0 4px 12px rgba(103,80,164,0.2);
  }
  .btn-primary:hover {
    background: #7965AF;
    box-shadow: 0 2px 6px rgba(103,80,164,0.4), 0 8px 20px rgba(103,80,164,0.25);
  }
  .state-layer {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: currentColor;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="label-top">ד — Material You</div>
  <div class="card">
    <div class="card-header">
      <div class="chip">👤 כניסה לעובד</div>
      <h1>שלום,<br>מי את/ה?</h1>
      <div class="subtitle">בחר/י שם מהרשימה והזן/י קוד</div>
    </div>
    <div class="worker-grid">
      <div class="worker-item selected">דוד כהן</div>
      <div class="worker-item">מרים לוי</div>
      <div class="worker-item">יוסי אברהם</div>
      <div class="worker-item">שרה גרין</div>
    </div>
    <div class="divider"></div>
    <div class="pin-label">קוד אישי</div>
    <div class="pin-dots">
      <div class="dot filled"></div>
      <div class="dot filled"></div>
      <div class="dot filled"></div>
      <div class="dot"></div>
    </div>
    <button class="btn btn-primary">כניסה ←</button>
  </div>
</body>
</html>
